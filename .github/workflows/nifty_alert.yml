name: Nifty Index Funds Drop Alert

on:
  schedule:
    # Runs every 15 min, 3:30 AM - 10:15 AM UTC = 9:00 AM - 3:45 PM IST (all days)
    - cron: '*/15 3-10 * * *'
  workflow_dispatch:  # Allow manual trigger for testing

permissions:
  contents: write

jobs:
  check-nifty-indices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pytz

      - name: Run Nifty Index Funds alert script
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python nifty_alert.py

      - name: Commit alert state if updated
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add alert_state.json || true
          git diff --staged --quiet || git commit -m "Update alert state [skip ci]"
          git push || true
